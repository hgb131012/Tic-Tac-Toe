<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2 Players Tic Tac Toe</title>
</head>
<body>
    <header>
        <h1>2 Players Tic Tac Toe</h1>
    </header>
    <div class="symbol-container">
            <p id="player-a">A: O</p>
            <p id="player-b">B: X</p>
    </div>
    <main>
        <div id="board-container">
            <div class="grid" data-index="0"></div>
            <div class="grid" data-index="1"></div>
            <div class="grid" data-index="2"></div>
            <div class="grid" data-index="3"></div>
            <div class="grid" data-index="4"></div>
            <div class="grid" data-index="5"></div>
            <div class="grid" data-index="6"></div>
            <div class="grid" data-index="7"></div>
            <div class="grid" data-index="8"></div>
        </div>
    </main>
    <div style="text-align: center; margin-top: 35px">
        <p id="player-turn">It's A's Turn</p>
    </div>
    <script src="script.js"></script>
</body>
</html>
